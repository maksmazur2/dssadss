{% extends 'user_navbar.html' %}
{% block content %}

<style>
    .form-label {
        font-weight: 600;
    }
    .btn-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 3px 6px rgba(0, 123, 255, 0.2);
    }
</style>

<script>
    function checkpassword() {
        const newPwd = document.changepassword.new.value;
        const confirmPwd = document.changepassword.confirm.value;

        if (newPwd !== confirmPwd) {
            alert('New Password and Confirm Password do not match!');
            document.changepassword.confirm.focus();
            return false;
        }
        return true;
    }
</script>

{% if error == "no" %}
<script>
    alert('Password updated successfully!');
    window.location = "{% url 'logout' %}";
</script>
{% elif error == "yes" %}
<script>
    alert('Something went wrong. Please try again later.');
</script>
{% elif error == "not" %}
<script>
    alert('Your current password is incorrect.');
</script>
{% endif %}

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-body">
            <h4 class="text-danger pb-2 border-bottom">Change Password</h4>

            <form method="POST" name="changepassword" onsubmit="return checkpassword()">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="old" class="form-control" placeholder="Enter current password" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new" class="form-control" placeholder="Enter new password" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm" class="form-control" placeholder="Confirm new password" required>
                    </div>
                </div>

                <div class="form-row mt-3">
                    <div class="col-md-6">
                        <button type="submit" class="btn btn-primary px-4 btn-submit">
                            <i class="fas fa-key mr-1"></i> Update Password
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
