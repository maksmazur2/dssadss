{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Campus Resource System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4.6.1 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css"
          integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            font-family: 'Mulish', sans-serif;
        }
        .nav_style {
            background: linear-gradient(to right, #3a5676, #456e97);
        }
        .navbar-brand,
        .nav-link {
            color: #fff !important;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
        .dropdown-menu {
            background-color: #3a5676;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
            min-width: 190px;
            z-index: 1050;
        }
        .dropdown-item {
            color: #eaf3ff;
        }
        .dropdown-item:hover,
        .dropdown-item:focus {
            background-color: #456e97;
            color: #ffffff;
        }
        .navbar-toggler {
            border-color: rgba(255,255,255,0.55);
        }
        .navbar-toggler:focus {
            box-shadow: 0 0 0 0.1rem rgba(255,255,255,0.4);
        }
        /* custom toggler icon so it stays visible on gradient background */
        .navbar-light .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255,255,255,0.85%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        /* mobile spacing tweaks */
        @media (max-width: 767.98px) {
            nav.navbar {
                padding: 0.75rem 1rem;
            }
            .navbar-brand {
                font-size: 16px;
                line-height: 1.3;
            }
            .navbar-nav .nav-link {
                padding: 0.35rem 0.75rem;
            }
            body {
                padding-top: 70px; /* keep content below fixed nav if used elsewhere */
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light nav_style p-3">
    <a class="navbar-brand" href="{% url 'index' %}">
        <i class="fas fa-university me-2"></i> Campus Resource Management System
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
            aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
        <ul class="navbar-nav text-capitalize">
            <li class="nav-item">
                <a href="{% url 'index' %}" class="nav-link">
                    <i class="fas fa-home"></i> Home
                </a>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="portalDropdown" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-lock"></i> Login to Portal
                </a>
                <div class="dropdown-menu" aria-labelledby="portalDropdown">
                    <a class="dropdown-item" href="{% url 'user_login' %}">User Login</a>
                    <a class="dropdown-item" href="{% url 'admin_login' %}">Staff Login</a>
                </div>
            </li>
        </ul>
    </div>
</nav>

<!-- Content Block -->
{% block main %}
{% endblock %}

<!-- Bootstrap 4.6.1 JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.min.js"></script>

<!-- Custom JS -->
<script src="{% static 'js/main.js' %}"></script>
<script>
    if (window.location.hash === '#userRegModal') {
        $('#userRegModal').modal('show');
    }
</script>
</body>
</html>
