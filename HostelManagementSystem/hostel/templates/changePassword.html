{% extends 'admin_base.html' %}
{% block main %}

<style>
    .form-section {
        border-left: 4px solid orange;
        padding-left: 15px;
    }

    .form-section label i {
        width: 20px;
    }
</style>

<script>
    function checkpassword() {
        if (document.changepassword.newpassword.value !== document.changepassword.confirmpassword.value) {
            alert('New Password and Confirm Password fields do not match');
            document.changepassword.confirmpassword.focus();
            return false;
        }
        return true;
    }
</script>

<!-- Alert Handling -->
{% if error == "no" %}
<script>
    alert('Password updated successfully');
    window.location = '{% url "logout" %}';
</script>
{% elif error == "yes" %}
<script>
    alert('Something went wrong, please try again later');
</script>
{% elif error == "not" %}
<script>
    alert('Your current password is incorrect');
</script>
{% endif %}

<!-- Change Password Form -->
<div class="card shadow mt-5">
    <div class="card-body">
        <h5 class="form-section text-dark mb-4">
            <i class="fas fa-key text-primary mr-2"></i> Change Password
        </h5>

        <div class="container-fluid">
            <form method="post" name="changepassword" onsubmit="return checkpassword();">
                {% csrf_token %}

                <div class="form-group mb-3">
                    <label><i class="fas fa-lock text-secondary"></i> Current Password</label>
                    <input type="password" name="oldpassword" class="form-control" placeholder="Enter current password" required>
                </div>

                <div class="form-group mb-3">
                    <label><i class="fas fa-lock-open text-secondary"></i> New Password</label>
                    <input type="password" name="newpassword" class="form-control" placeholder="Enter new password" required>
                </div>

                <div class="form-group mb-4">
                    <label><i class="fas fa-lock text-secondary"></i> Confirm Password</label>
                    <input type="password" name="confirmpassword" class="form-control" placeholder="Confirm new password" required>
                </div>

                <div class="text-right">
                    <input type="submit" value="Submit" class="btn btn-primary px-4">
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
